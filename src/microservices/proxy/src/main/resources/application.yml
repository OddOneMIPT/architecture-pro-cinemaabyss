server:
  port: ${PORT:8000}

proxy:
  monolith-url: ${MONOLITH_URL:http://monolith:8080}
  movies-service-url: ${MOVIES_SERVICE_URL:http://movies-service:8081}
  gradual-migration: ${GRADUAL_MIGRATION:true}
  movies-migration-percent: ${MOVIES_MIGRATION_PERCENT:0}
  events-service-url: ${EVENTS_SERVICE_URL:http://events-service:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
