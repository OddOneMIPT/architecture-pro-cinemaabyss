name: API Tests

on:
  push:
    branches: [main, cinema]
  pull_request:
    branches: [main, cinema]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run tests against"
        required: true
        default: "docker"
        type: choice
        options:
          - local
          - docker
      test_folder:
        description: "Test folder to run (leave empty for all)"
        required: false
        type: string

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Compose
        run: |
          docker compose --version

      - name: Start services with Docker Compose
        run: docker compose up -d --build

      - name: Wait for services (HTTP health endpoints)
        run: |
          set -e
          URLS=(
            "http://127.0.0.1:8080/health"
            "http://127.0.0.1:8081/api/movies/health"
            "http://127.0.0.1:8082/api/events/health"
            "http://127.0.0.1:8000/health"
          )

          for url in "${URLS[@]}"; do
            echo "Waiting for $url"
            for i in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                echo "OK: $url"
                break
              fi
              sleep 2
            done
            curl -fsS "$url" >/dev/null
          done

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: tests/postman/package-lock.json

      - name: Install Newman and dependencies
        working-directory: tests/postman
        run: npm install

      - name: Run API tests
        working-directory: tests/postman
        run: |
          # Build the Docker image
          docker build -t cinemaabyss-api-tests .

          # Run the tests in Docker
          docker run --network=cinemaabyss-network -v "$(pwd)/reports:/app/reports" cinemaabyss-api-tests

      - name: Stop services
        if: always()
        run: docker compose down
